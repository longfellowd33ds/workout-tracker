<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Workout Tracker — QR Code</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 24px;
    }

    .card {
      border: 3px solid #111;
      border-radius: 16px;
      padding: 40px 48px;
      text-align: center;
      max-width: 360px;
      width: 100%;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 800;
      margin-bottom: 4px;
    }

    .tagline {
      font-size: 0.9rem;
      color: #555;
      margin-bottom: 28px;
    }

    #qrcode {
      display: flex;
      justify-content: center;
      margin-bottom: 24px;
    }

    .url-display {
      font-size: 0.75rem;
      color: #888;
      word-break: break-all;
      margin-bottom: 28px;
    }

    .steps {
      text-align: left;
      font-size: 0.85rem;
      color: #333;
      line-height: 1.7;
    }

    .steps li {
      margin-left: 16px;
    }

    /* Print styles */
    @media print {
      body { background: #fff; }
      .no-print { display: none; }
    }

    .print-btn {
      margin-top: 32px;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px 28px;
      font-size: 0.95rem;
      cursor: pointer;
    }

    .print-btn:hover { opacity: 0.85; }

    .config-note {
      margin-top: 32px;
      background: #fff8e1;
      border: 1px solid #ffe082;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 0.82rem;
      color: #555;
      text-align: left;
      max-width: 360px;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>Log Your Workout</h1>
    <p class="tagline">Scan to track today's session</p>

    <div id="qrcode"></div>
    <p class="url-display" id="urlDisplay"></p>

    <ol class="steps">
      <li>Scan the QR code with your phone</li>
      <li>Select your workout type</li>
      <li>Tap "Log It" — done!</li>
    </ol>
  </div>

  <button class="print-btn no-print" onclick="window.print()">Print this page</button>

  <div class="config-note no-print" id="configNote" style="display:none">
    ⚠️ Update <code>FORM_URL</code> in this file with your GitHub Pages URL, then refresh.
  </div>

  <script>
    // ---------------------------------------------------------------
    // CONFIGURATION — paste your GitHub Pages URL here
    // e.g. "https://yourusername.github.io/workout-tracker/"
    // ---------------------------------------------------------------
    const FORM_URL = "YOUR_GITHUB_PAGES_URL_HERE";
    // ---------------------------------------------------------------

    const urlDisplay = document.getElementById("urlDisplay");
    const configNote = document.getElementById("configNote");

    if (FORM_URL === "YOUR_GITHUB_PAGES_URL_HERE") {
      urlDisplay.textContent = "Set FORM_URL in qr.html to generate the QR code.";
      configNote.style.display = "block";
    } else {
      urlDisplay.textContent = FORM_URL;
      new QRCode(document.getElementById("qrcode"), {
        text: FORM_URL,
        width: 220,
        height: 220,
        colorDark: "#111111",
        colorLight: "#ffffff",
        correctLevel: QRCode.CorrectLevel.M
      });
    }
  </script>

</body>
</html>
