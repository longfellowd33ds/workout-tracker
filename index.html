<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log Workout</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 0.9rem;
      color: #888;
      margin-bottom: 28px;
    }

    .datetime {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 12px 20px;
      text-align: center;
      margin-bottom: 28px;
      font-size: 1rem;
      color: #ccc;
      width: 100%;
      max-width: 340px;
    }

    .datetime span {
      color: #fff;
      font-weight: 600;
    }

    .label {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #666;
      margin-bottom: 12px;
      width: 100%;
      max-width: 340px;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
      max-width: 340px;
      margin-bottom: 28px;
    }

    .workout-btn {
      background: #1a1a1a;
      border: 2px solid #2a2a2a;
      border-radius: 12px;
      padding: 18px 20px;
      font-size: 1rem;
      font-weight: 600;
      color: #f0f0f0;
      cursor: pointer;
      text-align: left;
      transition: border-color 0.15s, background 0.15s;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .workout-btn .icon {
      font-size: 1.4rem;
      width: 32px;
      text-align: center;
    }

    .workout-btn:hover {
      border-color: #444;
      background: #222;
    }

    .workout-btn.selected {
      border-color: #4ade80;
      background: #0d2e1a;
      color: #4ade80;
    }

    .submit-btn {
      width: 100%;
      max-width: 340px;
      background: #4ade80;
      color: #0a1a0f;
      border: none;
      border-radius: 12px;
      padding: 18px;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }

    .submit-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .submit-btn:not(:disabled):hover {
      opacity: 0.9;
    }

    .submit-btn:not(:disabled):active {
      transform: scale(0.98);
    }

    /* Success state */
    .success {
      display: none;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 12px;
    }

    .success.show {
      display: flex;
    }

    .success-icon {
      font-size: 4rem;
    }

    .success h2 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #4ade80;
    }

    .success p {
      color: #888;
      font-size: 0.95rem;
    }

    .log-another {
      margin-top: 20px;
      background: transparent;
      border: 2px solid #2a2a2a;
      border-radius: 10px;
      padding: 12px 28px;
      color: #ccc;
      font-size: 0.95rem;
      cursor: pointer;
      transition: border-color 0.15s;
    }

    .log-another:hover {
      border-color: #444;
    }

    /* Error state */
    .error-msg {
      display: none;
      color: #f87171;
      font-size: 0.9rem;
      margin-top: -16px;
      margin-bottom: 12px;
      width: 100%;
      max-width: 340px;
      text-align: center;
    }

    .error-msg.show {
      display: block;
    }

    .form-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
    }
  </style>
</head>
<body>

  <!-- Form Section -->
  <div class="form-section" id="formSection">
    <h1>Log Workout</h1>
    <p class="subtitle">What are you training today?</p>

    <div class="datetime" id="datetime">
      <span id="datetimeText">Loading...</span>
    </div>

    <p class="label">Select workout type</p>

    <div class="buttons" id="workoutButtons">
      <button class="workout-btn" data-type="Back &amp; Bis" onclick="select(this)">
        <span class="icon">💪</span> Back &amp; Bis
      </button>
      <button class="workout-btn" data-type="Chest &amp; Tris" onclick="select(this)">
        <span class="icon">🏋️</span> Chest &amp; Tris
      </button>
      <button class="workout-btn" data-type="Legs &amp; Shoulders" onclick="select(this)">
        <span class="icon">🦵</span> Legs &amp; Shoulders
      </button>
      <button class="workout-btn" data-type="Cardio" onclick="select(this)">
        <span class="icon">🏃</span> Cardio
      </button>
      <button class="workout-btn" data-type="Functional Training" onclick="select(this)">
        <span class="icon">⚡</span> Functional Training
      </button>
    </div>

    <p class="error-msg" id="errorMsg">Something went wrong. Please try again.</p>

    <button class="submit-btn" id="submitBtn" disabled onclick="submitWorkout()">Log It</button>
  </div>

  <!-- Success Section -->
  <div class="success" id="successSection">
    <div class="success-icon">✅</div>
    <h2>Logged!</h2>
    <p id="successDetail"></p>
    <button class="log-another" onclick="reset()">Log another</button>
  </div>

  <script>
    // ---------------------------------------------------------------
    // CONFIGURATION — paste your Google Apps Script web app URL here
    // ---------------------------------------------------------------
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx0Cis1OFpdDHjImfmcSyv5zF_iGWZ9vgQvykVh7BcUkW2SUZ9yd5Ae-Ys_1haxP_7R1A/exec";
    // ---------------------------------------------------------------

    let selectedType = null;
    let currentDate = "";
    let currentTime = "";

    function formatDateTime() {
      const now = new Date();
      const days = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
      const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

      currentDate = now.toISOString().slice(0, 10); // YYYY-MM-DD
      const hours = String(now.getHours()).padStart(2, "0");
      const mins = String(now.getMinutes()).padStart(2, "0");
      currentTime = `${hours}:${mins}`;

      const display = `${days[now.getDay()]}, ${months[now.getMonth()]} ${now.getDate()} — ${currentTime}`;
      document.getElementById("datetimeText").textContent = display;
    }

    function select(btn) {
      document.querySelectorAll(".workout-btn").forEach(b => b.classList.remove("selected"));
      btn.classList.add("selected");
      selectedType = btn.dataset.type;
      document.getElementById("submitBtn").disabled = false;
      document.getElementById("errorMsg").classList.remove("show");
    }

    async function submitWorkout() {
      if (!selectedType) return;

      const btn = document.getElementById("submitBtn");
      btn.disabled = true;
      btn.textContent = "Logging...";

      const now = new Date();
      const days = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];

      const payload = {
        date: currentDate,
        time: currentTime,
        workoutType: selectedType,
        dayOfWeek: days[now.getDay()]
      };

      try {
        const res = await fetch(APPS_SCRIPT_URL, {
          method: "POST",
          mode: "no-cors",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        // no-cors mode means we can't read the response — if no exception, assume success
        showSuccess(payload);
      } catch (err) {
        document.getElementById("errorMsg").classList.add("show");
        btn.disabled = false;
        btn.textContent = "Log It";
      }
    }

    function showSuccess(payload) {
      document.getElementById("formSection").style.display = "none";
      const s = document.getElementById("successSection");
      s.classList.add("show");
      document.getElementById("successDetail").textContent =
        `${payload.workoutType} · ${payload.dayOfWeek}, ${payload.date} at ${payload.time}`;
    }

    function reset() {
      selectedType = null;
      document.querySelectorAll(".workout-btn").forEach(b => b.classList.remove("selected"));
      document.getElementById("submitBtn").disabled = true;
      document.getElementById("submitBtn").textContent = "Log It";
      document.getElementById("errorMsg").classList.remove("show");
      document.getElementById("successSection").classList.remove("show");
      document.getElementById("formSection").style.display = "flex";
      formatDateTime();
    }

    // Init
    formatDateTime();
  </script>
</body>
</html>
